<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Le Chat des Artistes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Open Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Open Sans", system-ui, sans-serif;
      background: #ffffff;
      color: #111;
    }

    .page {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      max-width: 1200px;
      padding: 40px;
      margin: 0 auto;
    }

    /* LEFT COLUMN */
    .intro h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .intro p {
      font-size: 14px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 24px;
    }

    /* RIGHT COLUMN GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 4px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }

    .card .role {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .card .links a {
      font-size: 13px;
      color: #111;
      text-decoration: none;
      margin-right: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }

    .card .links a:hover {
      border-bottom-color: #000;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- LEFT -->
    <div class="intro">
      <h1>Le Chat des Artistes</h1>
      <p>
        A shared building for artists and creatives.
        Painters, photographers, designers, writers, and researchers
        working side by side.
      </p>
    </div>

    <!-- RIGHT -->
    <div class="grid">

      <div class="card">
        <div>
          <h2>Artist Name</h2>
          <div class="role">Photographer</div>
        </div>
        <div class="links">
          <a href="#">Website</a>
          <a href="#">Instagram</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Studio XYZ</h2>
          <div class="role">Illustration & Design</div>
        </div>
        <div class="links">
          <a href="#">Website</a>
          <a href="#">Instagram</a>
        </div>
      </div>

      <div class="card">
        <div>
          <h2>Resident Name</h2>
          <div class="role">Writer</div>
        </div>
        <div class="links">
          <a href="#">Website</a>
        </div>
      </div>

      <!-- Duplicate cards as needed -->

    </div>
  </div>
</body>
</html>
